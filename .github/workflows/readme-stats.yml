name: Generate GitHub Readme Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "15 18 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "profile/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: Techd81
          path: profile/stats.svg
          card: stats
          options: >-
            show_icons=true&theme=radical&hide_border=true&rank_icon=github&custom_title=Techd%27s%20GitHub%20Stats

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: Techd81
          path: profile/top-langs.svg
          card: top-langs
          options: >-
            layout=compact&theme=radical&hide_border=true&langs_count=6&card_width=467&custom_title=Most%20Used%20Languages

      - name: Commit generated cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile stats cards"
          file_pattern: profile/*.svg
